name: wander_map_ai
description: "WanderMap AI - AI搭載のグルメ記録アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_maps_flutter: ^2.10.0
  google_generative_ai: ^0.4.6
  geolocator: ^13.0.2
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
